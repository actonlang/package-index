name: Build Acton Package Index

on:
  push:
    branches: [ main ]
  schedule:
    # Refresh the index daily
    - cron: '13 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
      - name: Build package index
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGE_INDEX_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          python3 build_index.py \
            --seed index.json \
            --output dist/index.json \
            --library-topic acton-library \
            --app-topic acton-app \
            --verbose

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build-index
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
